<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Helper Bot — Чеклист</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #f2f0eb);
    --text: var(--tg-theme-text-color, #1a1a1a);
    --hint: var(--tg-theme-hint-color, #8e8e93);
    --btn: var(--tg-theme-button-color, #1a1a1a);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --secondary-bg: var(--tg-theme-secondary-bg-color, #ffffff);

    --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
    --card-radius: 16px;

    --pink: #f4d1d1;
    --yellow: #f5e6b8;
    --green: #c8e6c9;
    --blue: #bbdefb;
    --purple: #e1bee7;
    --peach: #ffe0cc;
    --white: #ffffff;
    --gray: #f0f0f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 76px 0;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Header ---- */
  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding: 16px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .header-sub {
    font-size: 13px;
    color: var(--hint);
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--secondary-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: var(--card-shadow);
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .icon-btn:active { transform: scale(0.92); }
  .icon-btn svg { width: 18px; height: 18px; color: var(--text); }

  /* ---- Masonry grid ---- */
  .grid {
    padding: 4px 12px;
    column-count: 2;
    column-gap: 10px;
  }

  /* ---- Card ---- */
  .card {
    break-inside: avoid;
    background: var(--secondary-bg);
    border-radius: var(--card-radius);
    padding: 14px;
    margin-bottom: 10px;
    box-shadow: var(--card-shadow);
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
  }

  .card:active {
    transform: scale(0.97);
  }

  .card.done {
    opacity: 0.65;
  }

  .card-color-strip {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    border-radius: var(--card-radius) var(--card-radius) 0 0;
  }

  .card-text {
    font-size: 15px;
    line-height: 1.4;
    word-break: break-word;
    margin-top: 4px;
    flex: 1;
  }

  .card.done .card-text {
    text-decoration: line-through;
    color: var(--hint);
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
  }

  .card-check {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--hint);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    background: transparent;
  }

  .card.done .card-check {
    background: var(--btn);
    border-color: var(--btn);
  }

  .card-check svg {
    width: 14px;
    height: 14px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card.done .card-check svg {
    opacity: 1;
  }

  .card-delete {
    width: 26px;
    height: 26px;
    border: none;
    background: none;
    cursor: pointer;
    opacity: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s;
    border-radius: 50%;
  }

  .card:hover .card-delete,
  .card:active .card-delete {
    opacity: 0.4;
  }

  .card-delete:active {
    opacity: 0.8 !important;
    background: rgba(255, 59, 48, 0.1);
  }

  .card-delete svg { width: 14px; height: 14px; }

  /* ---- Card colors ---- */
  .card-pink    { background: var(--pink); }
  .card-yellow  { background: var(--yellow); }
  .card-green   { background: var(--green); }
  .card-blue    { background: var(--blue); }
  .card-purple  { background: var(--purple); }
  .card-peach   { background: var(--peach); }
  .card-white   { background: var(--white); }
  .card-gray    { background: var(--gray); }

  /* ---- List divider ---- */
  .list-divider {
    padding: 18px 16px 8px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--hint);
  }

  /* ---- Progress ---- */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px 8px;
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: rgba(0,0,0,0.06);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--btn);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-size: 13px;
    color: var(--hint);
    font-weight: 500;
    white-space: nowrap;
  }

  /* ---- Empty state ---- */
  .empty {
    text-align: center;
    padding: 60px 32px;
    color: var(--hint);
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .empty-text {
    font-size: 16px;
    line-height: 1.5;
  }

  /* ---- Bottom bar ---- */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--secondary-bg);
    padding: 10px 12px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 -1px 8px rgba(0,0,0,0.06);
    z-index: 20;
  }

  .bottom-bar input {
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: 20px;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }

  .bottom-bar input::placeholder {
    color: var(--hint);
  }

  .bottom-bar .sort-btn {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 50%;
    background: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .bottom-bar .sort-btn svg { width: 20px; height: 20px; color: var(--text); }

  .add-btn {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 50%;
    background: var(--btn);
    color: var(--btn-text);
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  .add-btn:active { transform: scale(0.9); }

  /* ---- Error toast ---- */
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: rgba(255, 59, 48, 0.95);
    color: #fff;
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 14px;
    z-index: 100;
    transition: transform 0.3s ease;
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="header">
  <div>
    <div class="header-title">📋 Чеклист</div>
    <div class="header-sub" id="headerSub"></div>
  </div>
</div>

<div class="progress-row">
  <div class="progress-track">
    <div class="progress-fill" id="progress" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel"></div>
</div>

<div id="content"></div>

<div class="bottom-bar">
  <input type="text" id="taskInput" placeholder="Новая задача..." autocomplete="off">
  <button class="add-btn" onclick="addTask()">+</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API_BASE = getApiBase();
const initData = tg.initData || "";

const COLORS = ["card-peach","card-yellow","card-green","card-blue","card-pink","card-purple","card-white","card-gray"];

function getApiBase() {
  const params = new URLSearchParams(window.location.search);
  return params.get("api") || "";
}

function authHeaders() {
  return {
    "Content-Type": "application/json",
    "X-Telegram-Init-Data": initData,
  };
}

let allLists = [];

function cardColor(idx) {
  return COLORS[idx % COLORS.length];
}

async function fetchTasks() {
  if (!API_BASE) { showToast("API URL не настроен"); return; }
  try {
    const res = await fetch(API_BASE + "/api/tasks", { headers: authHeaders() });
    const data = await res.json();
    if (data.error) { showToast(data.error); return; }
    allLists = data.lists || [];
    render();
  } catch (e) {
    showToast("Не удалось загрузить задачи");
  }
}

async function addTask() {
  const input = document.getElementById("taskInput");
  const text = input.value.trim();
  if (!text || !API_BASE) return;

  input.value = "";
  try {
    const res = await fetch(API_BASE + "/api/tasks/add", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ text }),
    });
    const data = await res.json();
    if (data.error) { showToast(data.error); return; }
    allLists = data.lists || [];
    render();
    try { tg.HapticFeedback.impactOccurred("light"); } catch(e) {}
  } catch (e) {
    showToast("Ошибка при добавлении");
  }
}

async function toggleTask(taskId) {
  if (!API_BASE) return;
  try {
    const res = await fetch(API_BASE + "/api/tasks/toggle", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ task_id: taskId }),
    });
    const data = await res.json();
    if (data.error) { showToast(data.error); return; }
    allLists = data.lists || [];
    render();
    try { tg.HapticFeedback.impactOccurred("light"); } catch(e) {}
  } catch (e) {
    showToast("Ошибка при обновлении");
  }
}

async function deleteTask(e, taskId) {
  e.stopPropagation();
  if (!API_BASE) return;
  try {
    const res = await fetch(API_BASE + "/api/tasks/delete", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ task_id: taskId }),
    });
    const data = await res.json();
    if (data.error) { showToast(data.error); return; }
    allLists = data.lists || [];
    render();
    try { tg.HapticFeedback.impactOccurred("medium"); } catch(e2) {}
  } catch (e2) {
    showToast("Ошибка при удалении");
  }
}

function render() {
  const content = document.getElementById("content");
  const progressEl = document.getElementById("progress");
  const progressLabel = document.getElementById("progressLabel");
  const headerSub = document.getElementById("headerSub");

  let totalTasks = 0, doneTasks = 0;
  allLists.forEach(l => l.tasks.forEach(t => { totalTasks++; if (t.done) doneTasks++; }));

  headerSub.textContent = totalTasks > 0 ? `${totalTasks} задач` : "";
  progressLabel.textContent = totalTasks > 0 ? `${doneTasks}/${totalTasks}` : "";
  progressEl.style.width = totalTasks > 0 ? `${(doneTasks/totalTasks)*100}%` : "0%";

  if (totalTasks === 0) {
    content.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📝</div>
        <div class="empty-text">Пока пусто.<br>Добавь первую задачу!</div>
      </div>`;
    return;
  }

  const showDividers = allLists.length > 1;
  let globalIdx = 0;
  let html = "";

  allLists.forEach((list, listIdx) => {
    if (list.tasks.length === 0) return;
    if (showDividers) {
      html += `<div class="list-divider">Список #${listIdx + 1}</div>`;
    }
    html += '<div class="grid">';
    list.tasks.forEach(task => {
      const doneClass = task.done ? " done" : "";
      const color = cardColor(globalIdx);
      globalIdx++;
      html += `
        <div class="card ${color}${doneClass}" onclick="toggleTask('${task.id}')">
          <div class="card-text">${escapeHtml(task.text)}</div>
          <div class="card-footer">
            <div class="card-check">
              <svg viewBox="0 0 14 14" fill="none">
                <path d="M2 7l3.5 3.5L12 4" stroke="${getComputedStyle(document.documentElement).getPropertyValue('--btn-text').trim()||'#fff'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <button class="card-delete" onclick="deleteTask(event,'${task.id}')">
              <svg viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 3V2a1 1 0 011-1h5a1 1 0 011 1v1H14v1h-1.1l-.72 9.36A1.5 1.5 0 0110.69 14H5.31a1.5 1.5 0 01-1.49-1.64L3.1 4H2V3h2.5zm1 0h5V2h-5v1zM4.11 4l.71 9.24a.5.5 0 00.5.76h5.37a.5.5 0 00.5-.76L11.89 4H4.11z"/></svg>
            </button>
          </div>
        </div>`;
    });
    html += '</div>';
  });

  content.innerHTML = html;
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}

document.getElementById("taskInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addTask();
});

fetchTasks();
</script>

</body>
</html>
