<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Helper Bot — Чеклист</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @font-face {
    font-family: 'SF Rounded';
    src: local('SF Pro Rounded'), local('.SF Compact Rounded'), local('SF Pro Display');
  }

  :root {
    --bg: #ffffff;
    --text: #1a1a1a;
    --hint: #8e8e93;
    --btn: #1a1a1a;
    --btn-text: #ffffff;
    --card-bg: #f4f4f4;
    --card-radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'SF Rounded', 'SF Pro Rounded', ui-rounded, Helvetica, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 12px 12px 80px;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Grid ---- */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* ---- Card ---- */
  .card {
    background: var(--card-bg);
    border-radius: var(--card-radius);
    aspect-ratio: 1;
    padding: 14px;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
  }

  .card:active {
    transform: scale(0.96);
  }

  .card.done {
    opacity: 0.55;
  }

  .card-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.35;
    word-break: break-word;
    flex: 1;
  }

  .card.done .card-text {
    text-decoration: line-through;
    color: var(--hint);
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 8px;
  }

  .card-check {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid #c7c7cc;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    background: transparent;
  }

  .card.done .card-check {
    background: var(--btn);
    border-color: var(--btn);
  }

  .card-check svg {
    width: 13px;
    height: 13px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card.done .card-check svg {
    opacity: 1;
  }

  .card-delete {
    width: 24px;
    height: 24px;
    border: none;
    background: none;
    cursor: pointer;
    opacity: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s;
    border-radius: 50%;
    color: var(--hint);
  }

  .card:hover .card-delete,
  .card:active .card-delete {
    opacity: 0.5;
  }

  .card-delete:active {
    opacity: 0.9 !important;
    color: #ff3b30;
  }

  .card-delete svg { width: 14px; height: 14px; }

  /* ---- Default category cards ---- */
  .card-category {
    font-size: 13px;
    color: var(--hint);
    font-weight: 400;
    margin-top: 2px;
  }

  .card-emoji {
    font-size: 28px;
    margin-bottom: 8px;
  }

  /* ---- List divider ---- */
  .list-divider {
    padding: 14px 4px 6px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--hint);
  }

  /* ---- Bottom bar (glass) ---- */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 10px 12px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 20;
    background: rgba(255, 255, 255, 0.72);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    backdrop-filter: blur(20px) saturate(180%);
    border-top: 0.5px solid rgba(0, 0, 0, 0.08);
  }

  .bottom-bar input {
    flex: 1;
    padding: 11px 16px;
    border: none;
    border-radius: 22px;
    font-size: 15px;
    font-family: inherit;
    background: rgba(118, 118, 128, 0.12);
    color: var(--text);
    outline: none;
    transition: background 0.2s;
  }

  .bottom-bar input:focus {
    background: rgba(118, 118, 128, 0.18);
  }

  .bottom-bar input::placeholder {
    color: var(--hint);
  }

  .add-btn {
    width: 42px;
    height: 42px;
    border: none;
    border-radius: 50%;
    background: var(--btn);
    color: var(--btn-text);
    font-size: 22px;
    font-weight: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  .add-btn:active { transform: scale(0.9); }

  /* ---- Error toast ---- */
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: rgba(255, 59, 48, 0.92);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    color: #fff;
    padding: 10px 20px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 500;
    z-index: 100;
    transition: transform 0.3s ease;
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div id="content"></div>

<div class="bottom-bar">
  <input type="text" id="taskInput" placeholder="Добавить задачу..." autocomplete="off">
  <button class="add-btn" onclick="addTask()">+</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API_BASE = getApiBase();
const initData = tg.initData || "";

const DEFAULT_CARDS = [
  { emoji: "🛒", title: "Покупки" },
  { emoji: "📝", title: "Заметки" },
  { emoji: "💼", title: "Работа" },
  { emoji: "📚", title: "Книги" },
];

function getApiBase() {
  const params = new URLSearchParams(window.location.search);
  if (params.get("api")) return params.get("api");
  return window.location.origin;
}

function authHeaders() {
  return {
    "Content-Type": "application/json",
    "X-Telegram-Init-Data": initData,
  };
}

let allLists = [];

async function fetchTasks() {
  if (!API_BASE) { render(); return; }
  try {
    const res = await fetch(API_BASE + "/api/tasks", { headers: authHeaders() });
    const data = await res.json();
    if (!data.error) {
      allLists = data.lists || [];
    }
  } catch (e) {}
  render();
}

async function addTask() {
  const input = document.getElementById("taskInput");
  const text = input.value.trim();
  if (!text || !API_BASE) return;

  input.value = "";
  try {
    const res = await fetch(API_BASE + "/api/tasks/add", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ text }),
    });
    const data = await res.json();
    if (data.error) { showToast(data.error); return; }
    allLists = data.lists || [];
    render();
    try { tg.HapticFeedback.impactOccurred("light"); } catch(e) {}
  } catch (e) {
    showToast("Ошибка при добавлении");
  }
}

async function toggleTask(taskId) {
  if (!API_BASE) return;
  try {
    const res = await fetch(API_BASE + "/api/tasks/toggle", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ task_id: taskId }),
    });
    const data = await res.json();
    if (data.error) { showToast(data.error); return; }
    allLists = data.lists || [];
    render();
    try { tg.HapticFeedback.impactOccurred("light"); } catch(e) {}
  } catch (e) {
    showToast("Ошибка при обновлении");
  }
}

async function deleteTask(e, taskId) {
  e.stopPropagation();
  if (!API_BASE) return;
  try {
    const res = await fetch(API_BASE + "/api/tasks/delete", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ task_id: taskId }),
    });
    const data = await res.json();
    if (data.error) { showToast(data.error); return; }
    allLists = data.lists || [];
    render();
    try { tg.HapticFeedback.impactOccurred("medium"); } catch(e2) {}
  } catch (e2) {
    showToast("Ошибка при удалении");
  }
}

function render() {
  const content = document.getElementById("content");

  let totalTasks = 0;
  allLists.forEach(l => l.tasks.forEach(() => totalTasks++));

  if (totalTasks === 0) {
    let html = '<div class="grid">';
    DEFAULT_CARDS.forEach(card => {
      html += `
        <div class="card">
          <div class="card-emoji">${card.emoji}</div>
          <div class="card-text">${card.title}</div>
          <div class="card-category">0 задач</div>
        </div>`;
    });
    html += '</div>';
    content.innerHTML = html;
    return;
  }

  const showDividers = allLists.length > 1;
  let html = "";

  allLists.forEach((list, listIdx) => {
    if (list.tasks.length === 0) return;
    if (showDividers) {
      html += `<div class="list-divider">Список #${listIdx + 1}</div>`;
    }
    html += '<div class="grid">';
    list.tasks.forEach(task => {
      const doneClass = task.done ? " done" : "";
      html += `
        <div class="card${doneClass}" onclick="toggleTask('${task.id}')">
          <div class="card-text">${escapeHtml(task.text)}</div>
          <div class="card-footer">
            <div class="card-check">
              <svg viewBox="0 0 14 14" fill="none">
                <path d="M2 7l3.5 3.5L12 4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <button class="card-delete" onclick="deleteTask(event,'${task.id}')">
              <svg viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 3V2a1 1 0 011-1h5a1 1 0 011 1v1H14v1h-1.1l-.72 9.36A1.5 1.5 0 0110.69 14H5.31a1.5 1.5 0 01-1.49-1.64L3.1 4H2V3h2.5zm1 0h5V2h-5v1zM4.11 4l.71 9.24a.5.5 0 00.5.76h5.37a.5.5 0 00.5-.76L11.89 4H4.11z"/></svg>
            </button>
          </div>
        </div>`;
    });
    html += '</div>';
  });

  content.innerHTML = html;
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}

document.getElementById("taskInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addTask();
});

fetchTasks();
</script>

</body>
</html>
