<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Helper Bot — Чеклист</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #000000);
    --hint: var(--tg-theme-hint-color, #999999);
    --link: var(--tg-theme-link-color, #2678b6);
    --btn: var(--tg-theme-button-color, #2678b6);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --secondary-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    padding-bottom: 80px;
    min-height: 100vh;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .counter {
    font-size: 14px;
    color: var(--hint);
    font-weight: 400;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .input-row input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--hint);
    border-radius: 10px;
    font-size: 15px;
    background: var(--secondary-bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .input-row input:focus {
    border-color: var(--btn);
  }

  .input-row input::placeholder {
    color: var(--hint);
  }

  .input-row button {
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: var(--btn);
    color: var(--btn-text);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  .input-row button:active {
    opacity: 0.7;
  }

  .list-group {
    margin-bottom: 24px;
  }

  .list-header {
    font-size: 13px;
    font-weight: 600;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .task {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--secondary-bg);
    border-radius: 10px;
    margin-bottom: 6px;
    transition: opacity 0.2s;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .task:active {
    opacity: 0.7;
  }

  .task.done .task-text {
    text-decoration: line-through;
    color: var(--hint);
  }

  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--hint);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .task.done .checkbox {
    background: var(--btn);
    border-color: var(--btn);
  }

  .checkbox svg {
    width: 14px;
    height: 14px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .task.done .checkbox svg {
    opacity: 1;
  }

  .task-text {
    flex: 1;
    font-size: 15px;
    line-height: 1.3;
    word-break: break-word;
  }

  .delete-btn {
    width: 28px;
    height: 28px;
    border: none;
    background: none;
    cursor: pointer;
    opacity: 0.4;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border-radius: 6px;
    transition: opacity 0.2s, background 0.2s;
  }

  .delete-btn:hover {
    opacity: 0.8;
    background: rgba(255, 59, 48, 0.1);
  }

  .delete-btn svg {
    width: 16px;
    height: 16px;
  }

  .empty {
    text-align: center;
    color: var(--hint);
    padding: 40px 20px;
    font-size: 15px;
    line-height: 1.5;
  }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--secondary-bg);
    border-radius: 2px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--btn);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .error {
    background: rgba(255, 59, 48, 0.1);
    color: #ff3b30;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }
</style>
</head>
<body>

<div id="error" class="error"></div>

<h1>
  <span>📋 Чеклист</span>
  <span class="counter" id="counter"></span>
</h1>

<div class="progress-bar">
  <div class="progress-bar-fill" id="progress" style="width: 0%"></div>
</div>

<div class="input-row">
  <input type="text" id="taskInput" placeholder="Новая задача..." autocomplete="off">
  <button id="addBtn" onclick="addTask()">+</button>
</div>

<div id="tasksContainer"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API_BASE = getApiBase();
const initData = tg.initData || "";

function getApiBase() {
  const params = new URLSearchParams(window.location.search);
  return params.get("api") || "";
}

function authHeaders() {
  return {
    "Content-Type": "application/json",
    "X-Telegram-Init-Data": initData,
  };
}

let allLists = [];

async function fetchTasks() {
  if (!API_BASE) { showError("API URL не настроен"); return; }
  try {
    const res = await fetch(API_BASE + "/api/tasks", { headers: authHeaders() });
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    allLists = data.lists || [];
    render();
  } catch (e) {
    showError("Не удалось загрузить задачи");
  }
}

async function addTask() {
  const input = document.getElementById("taskInput");
  const text = input.value.trim();
  if (!text || !API_BASE) return;

  input.value = "";
  try {
    const res = await fetch(API_BASE + "/api/tasks/add", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ text }),
    });
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    allLists = data.lists || [];
    render();
    tg.HapticFeedback.impactOccurred("light");
  } catch (e) {
    showError("Ошибка при добавлении");
  }
}

async function toggleTask(taskId) {
  if (!API_BASE) return;
  try {
    const res = await fetch(API_BASE + "/api/tasks/toggle", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ task_id: taskId }),
    });
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    allLists = data.lists || [];
    render();
    tg.HapticFeedback.impactOccurred("light");
  } catch (e) {
    showError("Ошибка при обновлении");
  }
}

async function deleteTask(e, taskId) {
  e.stopPropagation();
  if (!API_BASE) return;
  try {
    const res = await fetch(API_BASE + "/api/tasks/delete", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ task_id: taskId }),
    });
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    allLists = data.lists || [];
    render();
    tg.HapticFeedback.impactOccurred("medium");
  } catch (e2) {
    showError("Ошибка при удалении");
  }
}

function render() {
  const container = document.getElementById("tasksContainer");
  const counter = document.getElementById("counter");
  const progress = document.getElementById("progress");

  let totalTasks = 0;
  let doneTasks = 0;
  allLists.forEach(list => {
    list.tasks.forEach(t => {
      totalTasks++;
      if (t.done) doneTasks++;
    });
  });

  counter.textContent = totalTasks > 0 ? `${doneTasks}/${totalTasks}` : "";
  progress.style.width = totalTasks > 0 ? `${(doneTasks / totalTasks) * 100}%` : "0%";

  if (totalTasks === 0) {
    container.innerHTML = '<div class="empty">Пока пусто.<br>Добавь первую задачу!</div>';
    return;
  }

  const showHeaders = allLists.length > 1;
  let html = "";

  allLists.forEach((list, idx) => {
    if (list.tasks.length === 0) return;
    html += '<div class="list-group">';
    if (showHeaders) {
      html += `<div class="list-header">Список #${idx + 1}</div>`;
    }
    list.tasks.forEach(task => {
      const doneClass = task.done ? " done" : "";
      html += `
        <div class="task${doneClass}" onclick="toggleTask('${task.id}')">
          <div class="checkbox">
            <svg viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5L12 4" stroke="${getComputedStyle(document.documentElement).getPropertyValue('--btn-text').trim() || '#fff'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span class="task-text">${escapeHtml(task.text)}</span>
          <button class="delete-btn" onclick="deleteTask(event, '${task.id}')">
            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 3V2a1 1 0 011-1h5a1 1 0 011 1v1H14v1h-1.1l-.72 9.36A1.5 1.5 0 0110.69 14H5.31a1.5 1.5 0 01-1.49-1.64L3.1 4H2V3h2.5zm1 0h5V2h-5v1zM4.11 4l.71 9.24a.5.5 0 00.5.76h5.37a.5.5 0 00.5-.76L11.89 4H4.11z"/></svg>
          </button>
        </div>`;
    });
    html += '</div>';
  });

  container.innerHTML = html;
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

function showError(msg) {
  const el = document.getElementById("error");
  el.textContent = msg;
  el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 3000);
}

document.getElementById("taskInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") addTask();
});

fetchTasks();
</script>

</body>
</html>
